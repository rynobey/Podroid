name: Build APK

# Full build pipeline that mirrors `./build-all.sh all`:
#   1. Custom kernel  (Docker, aarch64 cross-compile)
#   2. Initramfs      (Docker, embeds kernel + Alpine init)
#   3. Rootfs         (Docker, arm64 emulated via QEMU/binfmt)
#   4. QEMU + bridge  (Docker, aarch64 cross-compile)
#   5. APK            (Gradle on host, consumes artifacts above)
#
# Triggers:
#   - push to any branch
#   - manual run via the Actions UI (workflow_dispatch)
#
# Output: the debug APK is uploaded as a workflow artifact you can
# download from the run's "Artifacts" panel.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # First cold build is ~30–40 min (kernel cross-compile + QEMU build);
    # later runs are faster thanks to Docker layer + Gradle caches.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GH-hosted runners are amd64; the rootfs stage uses
      # --platform=linux/arm64/v8 inside the Dockerfile, so binfmt
      # needs to know how to run arm64 binaries via QEMU.
      - name: Set up QEMU (binfmt for arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Use the default driver — `--output type=local,...` (used by
          # build-rootfs) needs buildkit, which the docker-container
          # driver provides by default.
          install: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Pin to a known-good cmdline-tools to keep builds reproducible.
          # The action caches the SDK; subsequent runs are near-instant.
          cmdline-tools-version: '11076708'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      # Free up disk: GH-hosted runners ship with ~14 GB free, and the
      # combined kernel + QEMU + Alpine pipeline gets close. Strip
      # unused toolchains to give the build breathing room.
      - name: Prune runner toolchains for headroom
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android/sdk/ndk \
                      /usr/local/share/boost \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      "$AGENT_TOOLSDIRECTORY/PyPy" \
                      "$AGENT_TOOLSDIRECTORY/Ruby" \
                      "$AGENT_TOOLSDIRECTORY/go" 2>/dev/null || true
          docker image prune -af >/dev/null 2>&1 || true
          df -h /

      - name: Build everything (./build-all.sh all)
        run: |
          chmod +x build-all.sh
          ./build-all.sh all

      - name: Show APK details
        if: always()
        run: |
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK size: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
            unzip -l app/build/outputs/apk/debug/app-debug.apk | tail -20
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.ref_name }}-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          # 14 days is plenty for a quick sideload + verify cycle and
          # well under GitHub's 90-day max.
          retention-days: 14
          if-no-files-found: error
