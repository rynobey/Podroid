name: Build APK

# Full build pipeline that mirrors `./build-all.sh all`:
#   1. Custom kernel  (Docker, aarch64 cross-compile)
#   2. Initramfs      (Docker, embeds kernel + Alpine init)
#   3. Rootfs         (Docker, arm64 emulated via QEMU/binfmt)
#   4. QEMU + bridge  (Docker, aarch64 cross-compile)
#   5. APK            (Gradle on host, consumes artifacts above)
#
# Triggers:
#   - push to any branch
#   - manual run via the Actions UI (workflow_dispatch)
#
# Output: the debug APK is uploaded as a workflow artifact you can
# download from the run's "Artifacts" panel.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    # First cold build is ~30–40 min (kernel cross-compile + QEMU build);
    # later runs are faster thanks to Docker layer + Gradle caches.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GH-hosted runners are amd64; the rootfs stage uses
      # --platform=linux/arm64/v8 inside the Dockerfile, so binfmt
      # needs to know how to run arm64 binaries via QEMU.
      - name: Set up QEMU (binfmt for arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # NOTE: deliberately NOT using docker/setup-buildx-action. That
      # action's default `docker-container` driver builds images into a
      # separate buildkit cache instead of loading them into the local
      # Docker daemon. build-all.sh then runs `docker create --name … <tag>`
      # against the local daemon, which can't see them and tries to pull
      # from a registry → "denied: requested access to the resource".
      #
      # The default Docker on ubuntu-latest already has BuildKit enabled
      # via the `docker` driver, which (a) loads built images to the
      # local daemon, and (b) still supports `--output type=local,…` used
      # by build-rootfs/Dockerfile.rootfs. So no buildx setup is needed.

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Pin to a known-good cmdline-tools to keep builds reproducible.
          # The action caches the SDK; subsequent runs are near-instant.
          cmdline-tools-version: '11076708'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      # Free up disk: GH-hosted runners ship with ~14 GB free, and the
      # combined kernel + QEMU + Alpine pipeline gets close. Strip
      # unused toolchains to give the build breathing room.
      - name: Prune runner toolchains for headroom
        run: |
          df -h /
          sudo rm -rf /usr/local/lib/android/sdk/ndk \
                      /usr/local/share/boost \
                      /opt/ghc \
                      /opt/hostedtoolcache/CodeQL \
                      "$AGENT_TOOLSDIRECTORY/PyPy" \
                      "$AGENT_TOOLSDIRECTORY/Ruby" \
                      "$AGENT_TOOLSDIRECTORY/go" 2>/dev/null || true
          docker image prune -af >/dev/null 2>&1 || true
          df -h /

      # Cache the *outputs* of the heavy native build stages (kernel,
      # initramfs, rootfs squashfs, QEMU + bridge .so files). GitHub
      # cache size limit is 10 GB/repo; total native artifacts here
      # are well under 500 MB. Cache key is derived from every file
      # that materially affects those outputs — Dockerfile content,
      # kernel config, native source, version pins. When any of those
      # change, the key changes, and we rebuild.
      - name: Cache native build outputs
        id: native-cache
        uses: actions/cache@v4
        with:
          path: |
            app/src/main/jniLibs/arm64-v8a
            app/src/main/assets/vmlinuz-virt
            app/src/main/assets/initrd.img
            app/src/main/assets/alpine-rootfs.squashfs
            app/src/main/assets/qemu
          key: native-${{ runner.os }}-${{ hashFiles('Dockerfile', 'build-rootfs/**', 'podroid_kernel.config', 'podroid-bridge.c', 'podroid-launcher.c', 'gradle.properties') }}
          # If the exact hash doesn't match, fall back to the most
          # recent native- cache and re-run only the differing stage.
          # In practice every stage reads from the same Dockerfile so
          # any change tends to invalidate everything, but the prefix
          # match means at least small tweaks (e.g. README-only) hit.
          restore-keys: |
            native-${{ runner.os }}-

      - name: Build native bits (kernel + initramfs + rootfs + QEMU)
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x build-all.sh
          ./build-all.sh initramfs
          ./build-all.sh rootfs
          ./build-all.sh qemu

      - name: Native cache hit — skipping the slow stages
        if: steps.native-cache.outputs.cache-hit == 'true'
        run: |
          echo "Restored native artifacts from cache:"
          ls -la app/src/main/jniLibs/arm64-v8a/ 2>/dev/null
          ls -la app/src/main/assets/vmlinuz-virt app/src/main/assets/initrd.img app/src/main/assets/alpine-rootfs.squashfs 2>/dev/null
          ls -la app/src/main/assets/qemu/ 2>/dev/null

      - name: Build APK (./build-all.sh apk)
        run: |
          chmod +x build-all.sh
          ./build-all.sh apk

      - name: Show APK details
        if: always()
        run: |
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || true
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK size: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
            unzip -l app/build/outputs/apk/debug/app-debug.apk | tail -20
          fi

      # actions/upload-artifact rejects forward slashes in artifact names,
      # and branch names like `feat/more-memory-options` include one. Replace
      # `/` with `-` and shorten the SHA so the artifact name is readable.
      - name: Compute artifact name
        id: artifact_name
        run: |
          safe_ref="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA:0:7}"
          echo "name=app-debug-${safe_ref}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          # 14 days is plenty for a quick sideload + verify cycle and
          # well under GitHub's 90-day max.
          retention-days: 14
          if-no-files-found: error
